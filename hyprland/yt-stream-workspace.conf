# Hyprland integration for yt-stream-workspace.
#
# Source this from hyprland.conf:
#   source = ~/.config/hypr/yt-stream-workspace.conf

# Keep this aligned with ~/.config/yt-stream-workspace/config.
monitor = YT-STREAM,1920x1080@60,auto-right,1.5

# Control handoff.
bind = SUPER,F11,exec,~/.local/bin/workspace-stream enter
bind = SUPER,F12,exec,~/.local/bin/workspace-stream leave

# Optional but recommended: route normal workspace switching through the wrapper.
# This keeps the virtual stream output pinned to the stream workspace during
# ordinary Super+number and mouse-wheel navigation.
#
# Replace your existing workspace binds with equivalents like:
# bind = SUPER,1,exec,~/.local/bin/workspace-stream workspace 1
# bind = SUPER,2,exec,~/.local/bin/workspace-stream workspace 2
# bind = SUPER,3,exec,~/.local/bin/workspace-stream workspace 3
# bind = SUPER,4,exec,~/.local/bin/workspace-stream workspace 4
# bind = SUPER,5,exec,~/.local/bin/workspace-stream workspace 5
# bind = SUPER,6,exec,~/.local/bin/workspace-stream workspace 6
# bind = SUPER,7,exec,~/.local/bin/workspace-stream workspace 7
# bind = SUPER,8,exec,~/.local/bin/workspace-stream workspace 8
# bind = SUPER,9,exec,~/.local/bin/workspace-stream workspace 9
# bind = SUPER,0,exec,~/.local/bin/workspace-stream workspace 10
#
# Example mouse scrolling:
# bind = SUPER,mouse_down,exec,~/.local/bin/workspace-stream workspace m+1
# bind = SUPER,mouse_up,exec,~/.local/bin/workspace-stream workspace m-1
